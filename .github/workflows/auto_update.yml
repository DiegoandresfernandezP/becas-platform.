name: Auto-Update Scholarships

on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions
  schedule:
    - cron: '0 8 * * 1' # Se ejecuta automáticamente todos los lunes a las 8:00 AM UTC

jobs:
  update-becas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Run Update Script
        run: python scripts/update_becas.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/becas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Nuevas becas agregadas" && git push)
