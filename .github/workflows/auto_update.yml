name: Auto-Update Scholarships

on:
  schedule:
    - cron: '0 0 * * 0' # Ejecutar cada domingo a medianoche
  workflow_dispatch: # Permitir ejecución manual

jobs:
  update-becas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then 
            pip install -r scripts/requirements.txt; 
          else
            pip install feedparser requests beautifulsoup4 lxml;
          fi

      - name: Run Update Script
        run: python scripts/update_becas.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data/becas.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Nuevas becas y re-validación" && git push)
